<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #todo-app { max-width: 500px; margin: auto; }
        input, button { padding: 10px; margin: 5px; }
        ul { list-style-type: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; }
        .completed { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <div id="todo-app">
        <h1>To-Do List</h1>
        <input type="text" id="task-input" placeholder="Add a new task..." />
        <button id="add-task">Add Task</button>
        <h2>Tasks</h2>
        <ul id="task-list"></ul>
        <h3>Statistics</h3>
        <div id="stats"></div>
    </div>

    <script>
        const taskInput = document.getElementById('task-input');
        const addTaskButton = document.getElementById('add-task');
        const taskList = document.getElementById('task-list');
        const stats = document.getElementById('stats');
        let tasks = [];

        // Load tasks from local storage
        function loadTasks() {
            tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            renderTasks();
            updateStats();
        }

        // Render tasks
        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class='${task.completed ? 'completed' : ''}'>${task.text}</span> <button onclick='deleteTask(${index})'>Delete</button> <button onclick='toggleComplete(${index})'>${task.completed ? 'Undo' : 'Complete'}</button>`;
                taskList.appendChild(li);
            });
        }

        // Update statistics
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            stats.innerHTML = `Total tasks: ${total}, Completed: ${completed}`;
        }

        // Add task
        addTaskButton.addEventListener('click', () => {
            const taskText = taskInput.value.trim();
            if (taskText) {
                tasks.push({ text: taskText, completed: false });
                taskInput.value = '';
                saveTasks();
                renderTasks();
            }
        });

        // Delete task
        window.deleteTask = function(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        };

        // Toggle complete
        window.toggleComplete = function(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        };

        // Save tasks to local storage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateStats();
        }

        // Load tasks on page load
        loadTasks();
    </script>
</body>
</html>
